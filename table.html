<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>

    <style>
        body {
            background-color: lightpink;
            font-family: Arial;
            text-align: center;
        }

        .box {
            background-color: pink;
            padding: 20px;
            margin: 40px auto;
            width: 70%;
            border-radius: 10px;
        }

        h1 {
            color: darkred;
        }

        table {
            width: 100%;
            border: 1px solid red;
        }

        th {
            background-color: red;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border: 1px solid red;
        }

        tr {
            background-color: #ffe6ea;
        }

        tr:hover {
            background-color: #ffb3c1;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Student Marks Table</h1>

        <table>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Maths</th>
                <th>Science</th>
                <th>Total</th>
            </tr>

            <tr>
                <td>John</td>
                <td>10A</td>
                <td>85</td>
                <td>78</td>
                <td>163</td>
            </tr>

            <tr>
                <td>Mary</td>
                <td>10B</td>
                <td>92</td>
                <td>88</td>
                <td>180</td>
            </tr>

            <tr>
                <td>David</td>
                <td>10A</td>
                <td>76</td>
                <td>82</td>
                <td>158</td>
            </tr>
        </table>
    </div>

</body>
</html>
