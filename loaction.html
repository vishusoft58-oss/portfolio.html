<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Location</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: rgb(134, 59, 71);
            text-align: center;
        }

        header {
            background-color: rgb(85, 13, 13);
            color: white;
            padding: 15px;
            font-size: 24px;
        }

        .box {
            background-color: rgb(121, 46, 58);
            width: 80%;
            margin: 100px auto;
            padding: 100px;
            border-radius: 10px;
        }

        h2 {
            color: rgb(69, 8, 8);
        }

        iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }

        footer {
            background-color: rgb(70, 10, 10);
            color: white;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>My Location Page</header>

<div class="box">
    <h2 style="color:white;">My Location</h2>

    <iframe 
        src="https://www.google.com/maps?q=Delhi&output=embed">
    </iframe>
</div>

<footer>© 2026 My Practice</footer>

</body>
</html>
