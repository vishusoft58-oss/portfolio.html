<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #2b0f14; /* deep wine background */
        color: white;
    }

    header {
        text-align: center;
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
        background-color: #4b0f1a;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        padding: 40px;
    }

    .box {
        width: 250px;
        height: 150px;
        background-color: #6d1a26;
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        cursor: pointer;
        transition: 0.3s;
        text-decoration: none;
        color: white;
    }

    .box:hover {
        background-color: #8c2230;
        transform: scale(1.05);
    }

    footer {
        text-align: center;
        padding: 15px;
        background-color: #4b0f1a;
        position: fixed;
        bottom: 0;
        width: 100%;
    }

    /* Mobile responsive */
    @media (max-width: 600px) {
        .box {
            width: 90%;
        }
    }
</style>

</head>
<body>

<header>HTML Practice Work</header>

<div class="container">
    <a href="table.html" class="box">Table</a>
    <a href="form.html" class="box">Registration Form</a>
    <a href="lists.html" class="box">My List Practice</a>
    <a href="banner image changing" class="box">banner</a>
    
</div>
<div class="container">
    <a href="youtube.html" class="box">video</a>
        <a href="loaction.html" class="box">loaction</a>
            <a href="audio.html" class="box">Audio</a>


</div>
<footer>© 2026 Practice</footer>

</body>
</html>
