<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resizing Boxes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            min-height: 100vh;
            padding: 20px;
        }

        .banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(90deg, #411408 0%, #b05f5f 100%);
            margin-bottom: 30px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .box {
            height: 250px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .box img {
            width: 100%;
            height: 70%;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
            transition: all 0.3s ease;
        }

        .box-text {
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.2);
            width: 100%;
            border-radius: 0 0 20px 20px;
        }

        .box:hover img {
            transform: scale(1.05);
        }

        /* Desktop Large (TV/Screens > 1200px) */
        @media (min-width: 1200px) {
            .banner {
                height: 250px;
                font-size: 3rem;
            }
            .box {
                height: 300px;
                font-size: 2rem;
            }
            body {
                background: linear-gradient(45deg, #ff9a9e, #5f0101, #fecfef);
            }
        }

        /* Laptop (1024px - 1199px) */
        @media (min-width: 1024px) and (max-width: 1199px) {
            .banner {
                background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            }
            .box:nth-child(1) { background: linear-gradient(45deg, #ffecd2 0%, #fcb69f 100%); }
            .box:nth-child(2) { background: linear-gradient(45deg, #a8edea 0%, #fed6e3 100%); }
            .box:nth-child(3) { background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 100%); }
            .box:nth-child(4) { background: linear-gradient(45deg, #a1c4fd 0%, #c2e9fb 100%); }
            .box:nth-child(5) { background: linear-gradient(45deg, #d299c2 0%, #fef9d7 100%); }
        }

        /* Tablet (768px - 1023px) */
        @media (min-width: 768px) and (max-width: 1023px) {
            body {
                background: linear-gradient(45deg, #a8edea, #fed6e3);
            }
            .banner {
                height: 180px;
                font-size: 2rem;
                background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            }
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Phone Large (481px - 767px) */
        @media (min-width: 481px) and (max-width: 767px) {
            body {
                background: linear-gradient(45deg, #ffecd2, #fcb69f);
                padding: 15px;
            }
            .banner {
                height: 150px;
                font-size: 1.8rem;
                background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%);
            }
            .container {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .box {
                height: 200px;
                font-size: 1.3rem;
            }
        }

        /* Phone Small (< 480px) */
        @media (max-width: 480px) {
            body {
                background: linear-gradient(45deg, #667eea, #764ba2);
                padding: 10px;
            }
            .banner {
                height: 120px;
                font-size: 1.5rem;
                background: linear-gradient(90deg, #fa709a 0%, #fee140 100%);
                margin-bottom: 20px;
            }
            .container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .box {
                height: 180px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="banner">Welcome to My Resizing Page! </div>
    
    <div class="container">
        <div class="box">
            <img src="https://i.pinimg.com/736x/be/bd/f0/bebdf0010fa0f612322bfe9bbe3c747f.jpg" alt="Ui design">
            <div class="box-text">Ui design</div>
        </div>
        <div class="box">
            <img src="https://i.pinimg.com/736x/f8/67/17/f86717d3b599be57b6985db8da4fe102.jpg" alt="Graphic design ">
            <div class="box-text">Graphic design</div>
        </div>
        <div class="box">
            <img src="https://pixabay.com/images/download/pexels-code-1839406_1920.jpg" alt="HTML">
            <div class="box-text">HTML</div>
        </div>
        <div class="box">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Videos">
            <div class="box-text">videos</div>
        </div>
        <div class="box">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Picture">
            <div class="box-text">pictures</div>
        </div>
    </div>
</body>
</html>
